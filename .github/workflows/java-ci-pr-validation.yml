name: Java CI - PR Validation 👔

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Java

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: adopt
          cache: gradle

      - name: Build and run Unit/Integration Tests with Gradle
        run: gradle clean build test --no-daemon --refresh-dependencies || return 0